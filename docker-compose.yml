services:
  cert-generator:
    build:
      context: ./APIRentai
      dockerfile: Dockerfile.certs
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
    user: "0:0"

  nginx:
    container_name: nginx
    image: nginx:1.29.1-bookworm
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./APIRentai/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    restart: unless-stopped
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    networks:
      - app-network

  api:
    build: ./APIRentai
    container_name: api
    volumes:
      - ./APIRentai:/app
      - uploads_data:/app/uploads
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      cert-generator: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [app-network, kafka-network]

  notif_consumer:
    build: ./APIRentai
    container_name: notif_consumer
    volumes:
      - ./APIRentai:/app
    env_file: .env
    environment:
      - PYTHONPATH=/app
    command: ["python", "-u", "consumers/teleconsultation_notification_consumer.py"]
    depends_on: [kafka, redis]
    networks: [app-network, kafka-network]
    restart: always

  email_consumer:
    build: ./APIRentai
    container_name: email_consumer
    volumes:
      - ./APIRentai:/app
      - ./APIRentai/logs:/app/logs
    env_file: .env
    command: python consumers/user_registration_consumer.py
    depends_on: [kafka, db, redis]
    restart: unless-stopped
    networks: [app-network, kafka-network]

  frontend:
    container_name: rentai-frontend
    build:
      context: ./AppFrontRentai
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL_ARG=${VITE_API_BASE_URL}
    env_file: .env
    restart: always
    networks: [app-network]

  db:
    image: postgres:17.5-trixie
    container_name: postgres_db
    volumes: [postgres_data:/var/lib/postgresql/data/]
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [app-network]

  redis:
    image: redis:8.2-bookworm
    container_name: redis
    env_file: .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: unless-stopped
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks: [app-network]

  mailhog:
    image: mailhog/mailhog:latest
    env_file: .env
    container_name: mailhog
    ports: ["1025:1025", "8025:8025"]
    restart: unless-stopped
    networks: [app-network]

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka_broker
    env_file: .env
    environment:
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    ports: ["9094:9094"]
    networks: [kafka-network]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka_broker:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  app-network:
    driver: bridge
  kafka-network:
    driver: bridge